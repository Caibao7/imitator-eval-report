      --line: rgba(92, 76, 58, 0.16);
      --orange: #bf5b35;
      --green: #1f6d5d;
      --gold: #cb9a3d;
      --slate: #738296;

    body {

      color: var(--ink);

        linear-gradient(180deg, #faf5ee 0%, #f4ecdf 58%, #eee2d2 100%);

    .wrap { max-width: 1440px; margin: 0 auto; padding: 28px; }
    .hero, .grid-2, .grid-3 { display: grid; gap: 18px; margin-bottom: 18px; }

    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      backdrop-filter: blur(12px);
      box-shadow: 0 16px 44px rgba(20, 27, 40, .08);
    }
    h1, h2, h3 { margin: 0; }
    h1 { font-size: 38px; letter-spacing: -.03em; }
    h2 { font-size: 22px; margin-bottom: 12px; }
    p { margin: 0; color: var(--muted); }
    .metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 18px; }
    .metric {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.84), rgba(248,238,225,.9));
    }
    .metric .label { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .metric .value { font-size: 30px; margin-top: 8px; }
    .subtle { font-size: 12px; color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f7ebdf;
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .list { display: grid; gap: 8px; }
    .list-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,.62);
      font-size: 14px;
    }
    .bars { display: grid; gap: 12px; }
    .bar-row { display: grid; grid-template-columns: 200px 1fr 90px; gap: 10px; align-items: center; font-size: 14px; }
    .track { height: 14px; border-radius: 999px; background: #efe5d6; overflow: hidden; }
    .fill { height: 100%; border-radius: 999px; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; }
    .scatter {
      position: relative;
      height: 380px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background:
        linear-gradient(to right, rgba(92,76,58,.08) 1px, transparent 1px),
        linear-gradient(to top, rgba(92,76,58,.08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.84), rgba(247,237,225,.94));
      background-size: 10% 100%, 100% 10%, auto;
      overflow: hidden;
    }
    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.72);
      transform: translate(-50%, 50%);
      box-shadow: 0 6px 14px rgba(31,36,48,.15);
    }
    .legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; color: var(--muted); font-size: 12px; }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .legend .l0::before { background: var(--orange); }
    .legend .l1::before { background: var(--green); }
    .legend .other::before { background: var(--gold); }
    .axis { display: flex; justify-content: space-between; margin-top: 8px; color: var(--muted); font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    @media (max-width: 980px) {
      .hero, .grid-2, .grid-3, .metrics { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; }
    }
  </style>

 "L0_TwoRobotPickAppleToScale-v1", "env_id": "TwoRobotPickAppleToScale-v1", "level": "L0", "num_episodes": 1, "success_once_mean": 0.0, "success_at_end_mean": 0.0, "return_mean": 0.0, "reward_mean": 0.0, "episode_len_mean": 500.0, "source": "online_eval_result", "video_count": 1, "status": "ok", "updated_at": "2026-03-11T23:33:45", "log_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L0_TwoRobotPickAppleToScale-v1/eval.log", "online_eval_result_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L0_TwoRobotPickAppleToScale-v1/online_eval_result.json", "online_eval_raw_metrics_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L0_TwoRobotPickAppleToScale-v1/online_eval_episode_metrics.json"}], "top_reward_fail_rows": [{"checkpoint_tag": "final", "checkpoint_path": "/mnt/sdf/dataset/zhouxunzhe/yiyang/PolicyGen/runs/dp_lerobot_task_encoder_unseen_500M/checkpoints/final.pt", "result_dir": "final_batch_eval_result", "task_name": "L1_TwoRobotPickAppleBasket-v1", "env_id": "TwoRobotPickAppleBasket-v1", "level": "L1", "num_episodes": 1, "success_once_mean": 1.0, "success_at_end_mean": 0.0, "return_mean": 95.0, "reward_mean": 0.19, "episode_len_mean": 500.0, "source": "online_eval_result", "video_count": 1, "status": "ok", "updated_at": "2026-03-11T23:25:53", "log_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L1_TwoRobotPickAppleBasket-v1/eval.log", "online_eval_result_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L1_TwoRobotPickAppleBasket-v1/online_eval_result.json", "online_eval_raw_metrics_file": "runs/dp_lerobot_task_encoder_unseen_500M/final_batch_eval_result/L1_TwoRobotPickAppleBasket-v1/online_eval_episode_metrics.json"}, {"checkpoint_tag": "final", "checkpoint_path": "/mnt/sdf/dataset/zhouxunzhe/yiyang/PolicyGen/runs/dp_lerobot_task_encoder_unseen_500M/checkpoints/final.pt", "result_dir": "final_batch_eval_result", "task_name": "L0_TwoRobotPlaceB     function fmt(v, digits = 4) {
      if (v === null || v === undefined || Number.isNaN(v)) return '-';
      return Number(v).toFixed(digits);
    }

    function pct(v) {
      if (v === null || v === undefined || Number.isNaN(v)) return '-';
      return (Number(v) * 100).toFixed(1) + '%';
    }

    function renderHeadline() {
      const o = payload.summary.overall;
      const items = [
        ['Tasks', payload.rows.length, 0],
        ['Episodes', o.episodes, 0],
        ['Success Once', o.success_once_mean, 4],
        ['Success At End', o.success_at_end_mean, 4],
        ['Reward Mean', o.reward_mean, 4],
      ];
      document.getElementById('headline').innerHTML = items.map(([label, value, digits]) => `
        <div class="metric">
          <div class="label">${label}</div>
          <div class="value">${digits === 0 ? value : fmt(value, digits)}</div>
        </div>
      `).join('');
    }

    function renderScope() {
      const scope = document.getElementById('scope');
      const ckpt = Object.entries(payload.summary.per_checkpoint)[0];
      const [name, info] = ckpt;
      scope.innerHTML = `
        <div class="list-item">
          <div class="pill-row"><span class="badge">${name}</span></div>
          <div class="subtle">tasks=${info.tasks}, episodes=${info.episodes}, success_at_end=${pct(info.success_at_end_mean)}</div>
        </div>
      `;
    }

    function renderBars(targetId, rows, formatter) {
      const max = Math.max(...rows.map(r => r.maxValue ?? r.value ?? 0), 0.0001);
      document.getElementById(targetId).innerHTML = rows.map(r => `
        <div class="bar-row">
          <div class="mono">${r.label}</div>
          <div class="track"><div class="fill" style="width:${((r.value || 0) / max) * 100}%; background:${r.color}"></div></div>
          <div>${formatter(r.value)}</div>
        </div>
      `).join('');
    }

    function renderLevelBars() {
      const rows = Object.entries(payload.summary.per_level_overall).map(([label, info]) => ({
        label,
        value: info.success_at_end_mean,
        color: label === 'L0' ? 'linear-gradient(90deg, #bf5b35 0%, #de8f53 100%)' : 'linear-gradient(90deg, #1f6d5d 0%, #49a08f 100%)'
      }));
      renderBars('level-bars', rows, pct);
    }

    function renderRewardBars() {
      const o = payload.summary.overall;
      renderBars('reward-bars', [
        { label: 'Return Mean', value: o.return_mean, color: 'linear-gradient(90deg, #bf5b35 0%, #de8f53 100%)' },
        { label: 'Reward Mean', value: o.reward_mean, color: 'linear-gradient(90deg, #1f6d5d 0%, #49a08f 100%)', maxValue: 1.0 },
        { label: 'Episode Len', value: o.episode_len_mean, color: 'linear-gradient(90deg, #cb9a3d 0%, #e0bd73 100%)' },
      ], v => fmt(v));
    }

    function renderCounters() {
      const rows = payload.rows;
      const finalSuccess = rows.filter(r => (r.success_at_end_mean || 0) > 0).length;
      const transient = rows.filter(r => (r.success_once_mean || 0) > (r.success_at_end_mean || 0)).length;
      const rewardFail = rows.filter(r => (r.reward_mean || 0) > 0 && (r.success_at_end_mean || 0) === 0).length;
      const zeroProgress = rows.filter(r => (r.reward_mean || 0) === 0 && (r.success_once_mean || 0) === 0).length;
      document.getElementById('counters').innerHTML = [
        `最终成功任务: ${finalSuccess} / ${rows.length}`,
        `中途成功但最终失败: ${transient}`,
        `reward>0 但最终失败: ${rewardFail}`,
        `reward=0 且 success_once=0: ${zeroProgress}`,
      ].map(x => `<div class="list-item">${x}</div>`).join('');
    }

    function renderScatter() {
      const rows = payload.rows;
      const maxReward = Math.max(...rows.map(r => r.reward_mean || 0), 0.001);
      const root = document.getElementById('scatter');
      root.innerHTML = rows.map(row => {
        const x = (row.success_at_end_mean || 0) * 100;
        const y = ((row.reward_mean || 0) / maxReward) * 100;
        const color = row.level === 'L0' ? 'var(--orange)' : (row.level === 'L1' ? 'var(--green)' : 'var(--gold)');
        const title = `${row.task_name} | success_at_end=${pct(row.success_at_end_mean)} | reward=${fmt(row.reward_mean)} | return=${fmt(row.return_mean)}`;
        return `<div class="dot" title="${title}" style="left:${x}%; bottom:${y}%; background:${color}"></div>`;
      }).join('');
    }

    function renderSpecial() {
      const special = payload.summary.special;
      const transient = special.transient_success_rows.slice(0, 8).map(row =>
        `${row.task_name}: success_once=${pct(row.success_once_mean)}, success_at_end=${pct(row.success_at_end_mean)}, reward=${fmt(row.reward_mean)}, return=${fmt(row.return_mean)}`
      );
      const rewardFail = special.top_reward_fail_rows.slice(0, 8).map(row =>
        `${row.task_name}: reward=${fmt(row.reward_mean)}, return=${fmt(row.return_mean)}, success_at_end=${pct(row.success_at_end_mean)}`
      );
      document.getElementById('special').innerHTML = [
        transient.length ? `典型 transient success:<br>${transient.join('<br>')}` : '没有检测到 transient success',
        rewardFail.length ? `高 reward 但最终失败:<br>${rewardFail.join('<br>')}` : '没有检测到 reward>0 且最终失败的任务',
      ].map(x => `<div class="list-item">${x}</div>`).join('');
    }

    function renderTable(id, rows) {
      document.getElementById(id).innerHTML = `
        <thead>
          <tr>
            <th>Task</th>
            <th>Level</th>
            <th>Return</th>
            <th>Reward</th>
            <th>Success End</th>
            <th>Success Once</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td class="mono">${row.task_name}</td>
              <td>${row.level || '-'}</td>
              <td>${fmt(row.return_mean)}</td>
              <td>${fmt(row.reward_mean)}</td>
              <td>${pct(row.success_at_end_mean)}</td>
              <td>${pct(row.success_once_mean)}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
    }

    function renderDetailTable() {
      const rows = payload.rows.slice().sort((a, b) => {
        const sa = a.success_at_end_mean || 0;
        const sb = b.success_at_end_mean || 0;
        if (sb !== sa) return sb - sa;
        const ra = a.reward_mean || 0;
        const rb = b.reward_mean || 0;
        if (rb !== ra) return rb - ra;
        return (b.return_mean || 0) - (a.return_mean || 0);
      });
      document.getElementById('detail-table').innerHTML = `
        <thead>
          <tr>
            <th>Task</th>
            <th>Level</th>
            <th>Episodes</th>
            <th>Success Once</th>
            <th>Success End</th>
            <th>Return</th>
            <th>Reward</th>
            <th>Episode Len</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(row => `
            <tr>
              <td class="mono">${row.task_name}</td>
              <td>${row.level || '-'}</td>
              <td>${row.num_episodes || '-'}</td>
              <td>${pct(row.success_once_mean)}</td>
              <td>${pct(row.success_at_end_mean)}</td>
              <td>${fmt(row.return_mean)}</td>
              <td>${fmt(row.reward_mean)}</td>
              <td>${fmt(row.episode_len_mean)}</td>
              <td>${row.source}</td>
            </tr>
          `).join('')}
        </tbody>
      `;
    }

    renderHeadline();
    renderScope();
    renderLevelBars();
    renderRewardBars();
    renderCounters();
    renderScatter();
    renderSpecial();
    renderTable('top-table', payload.summary.special.top_return_rows);
    renderTable('fail-table', payload.summary.special.top_reward_fail_rows);
    renderDetailTable();
  </script>
</body>
